<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Valorant Gelişmiş</title>
<style>
body { margin:0; overflow:hidden; background:#111; color:white; font-family:Arial; }
#ui { position:absolute; top:10px; left:10px; }
#menu { position:absolute; top:0; left:0; width:100%; height:100%; background:#000c; display:flex; justify-content:center; align-items:center; flex-direction:column; }
button { padding:10px 20px; margin:10px; font-size:18px; }
canvas { display:block; }
</style>
</head>
<body><div id="menu">
<h1>Mini Valorant</h1>
<button onclick="startGame()">Oyuna Başla</button>
<button onclick="openShop()">Market</button>
</div><div id="ui" style="display:none">
Skor: <span id="score">0</span><br>
Can: <span id="hp">100</span>
</div><canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player, enemies, bullets, enemyBullets, score, hp, gameRunning=false, weapon=1;

function init(){
player = { x: canvas.width/2, y: canvas.height/2, size: 20 };
enemies = [];
bullets = [];
enemyBullets = [];
score = 0;
hp = 100;
for(let i=0;i<3;i++) spawnEnemy();
}

function spawnEnemy(){
enemies.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size:20 });
}

canvas.addEventListener("touchstart", (e)=>{
if(!gameRunning) return;
let t = e.touches[0];
let speed = weapon==1?20:10;
bullets.push({ x:player.x, y:player.y, dx:(t.clientX-player.x)/speed, dy:(t.clientY-player.y)/speed });
});

canvas.addEventListener("touchmove", (e)=>{
if(!gameRunning) return;
let t=e.touches[0];
player.x=t.clientX; player.y=t.clientY;
});

function update(){
bullets.forEach(b=>{b.x+=b.dx; b.y+=b.dy});
enemyBullets.forEach(b=>{b.x+=b.dx; b.y+=b.dy});

// enemy hareket + ateş
if(Math.random()<0.02){
enemies.forEach(en=>{
enemyBullets.push({ x:en.x, y:en.y, dx:(player.x-en.x)/30, dy:(player.y-en.y)/30 });
});
}

// çarpışma
bullets.forEach((b,i)=>{
enemies.forEach((en,j)=>{
let dx=b.x-en.x, dy=b.y-en.y;
if(Math.sqrt(dx*dx+dy*dy)<en.size){
enemies.splice(j,1);
bullets.splice(i,1);
score+=10;
spawnEnemy();
}
});
});

enemyBullets.forEach((b,i)=>{
let dx=b.x-player.x, dy=b.y-player.y;
if(Math.sqrt(dx*dx+dy*dy)<20){
hp-=10;
enemyBullets.splice(i,1);
if(hp<=0){ gameOver(); }
}
});

// ui güncelle
if(gameRunning){
document.getElementById("score").innerText=score;
document.getElementById("hp").innerText=hp;
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

// player
ctx.fillStyle="lime";
ctx.beginPath(); ctx.arc(player.x,player.y,20,0,Math.PI*2); ctx.fill();

// enemies
ctx.fillStyle="red";
enemies.forEach(en=>{ctx.beginPath(); ctx.arc(en.x,en.y,20,0,Math.PI*2); ctx.fill();});

// bullets
ctx.fillStyle="white";
bullets.forEach(b=>{ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill();});

// enemy bullets
ctx.fillStyle="orange";
enemyBullets.forEach(b=>{ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill();});
}

function loop(){
if(gameRunning){ update(); draw(); }
requestAnimationFrame(loop);
}
loop();

function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("ui").style.display="block";
init();
gameRunning=true;
}

function openShop(){
let sec = prompt("Silah seç: 1=Normal, 2=Hızlı (50 skor)");
if(sec==2 && score>=50){ weapon=2; alert("Hızlı silah alındı!"); }
else alert("Yetersiz skor!");
}

function gameOver(){
alert("Öldün! Skor: "+score);
location.reload();
}

</script></body>
</html>
