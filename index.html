<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Mini FPS Gelişmiş</title>
<style>
body{margin:0;background:black;color:white;font-family:Arial}
#menu,#gameover{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000a}
#ui{position:absolute;top:10px;left:10px}
button{padding:10px 20px;margin:10px;font-size:18px}
canvas{display:block}
</style>
</head>
<body><div id="menu">
<h1>Mini FPS</h1>
<button onclick="startGame()">Başla</button>
<button onclick="shop()">Market</button>
</div><div id="gameover" style="display:none">
<h1>Öldün</h1>
<p>Skor: <span id="final"></span></p>
<button onclick="restart()">Yeniden Doğ</button>
</div><div id="ui" style="display:none">
Skor: <span id="score">0</span><br>
Can: <span id="hp">100</span>
</div><canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let player,enemies,bullets,eBullets,score,hp,run=false,weapon=1;

function init(){
player={x:c.width/2,y:c.height/2};
enemies=[];bullets=[];eBullets=[];
score=0;hp=100;
for(let i=0;i<2;i++) spawn();
}

function spawn(){
enemies.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

c.addEventListener("touchmove",e=>{
if(!run)return;
let t=e.touches[0];
player.x=t.clientX;player.y=t.clientY;
});

c.addEventListener("touchstart",e=>{
if(!run)return;
let t=e.touches[0];
let sp=weapon==1?20:10;
bullets.push({x:player.x,y:player.y,dx:(t.clientX-player.x)/sp,dy:(t.clientY-player.y)/sp});
});

function update(){
bullets.forEach(b=>{b.x+=b.dx;b.y+=b.dy});
eBullets.forEach(b=>{b.x+=b.dx;b.y+=b.dy});

// daha az ateş
if(Math.random()<0.005){
enemies.forEach(en=>{
eBullets.push({x:en.x,y:en.y,dx:(player.x-en.x)/40,dy:(player.y-en.y)/40});
});
}

// vurma
bullets.forEach((b,i)=>{
enemies.forEach((en,j)=>{
if(Math.hypot(b.x,en.x-b.x)<9999 && Math.hypot(b.x-en.x,b.y-en.y)<20){
enemies.splice(j,1);
bullets.splice(i,1);
score+=10;
spawn();
}
});
});

// hasar düşük
 eBullets.forEach((b,i)=>{
if(Math.hypot(b.x-player.x,b.y-player.y)<20){
hp-=5;
eBullets.splice(i,1);
if(hp<=0) gameOver();
}
});

scoreEl.innerText=score;
hpEl.innerText=hp;
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);

ctx.fillStyle="lime";
ctx.beginPath();ctx.arc(player.x,player.y,20,0,Math.PI*2);ctx.fill();

ctx.fillStyle="red";
enemies.forEach(en=>{ctx.beginPath();ctx.arc(en.x,en.y,20,0,Math.PI*2);ctx.fill();});

ctx.fillStyle="white";
bullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fill();});

ctx.fillStyle="orange";
eBullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fill();});
}

function loop(){
if(run){update();draw();}
requestAnimationFrame(loop);
}
loop();

const scoreEl=document.getElementById("score");
const hpEl=document.getElementById("hp");

function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("ui").style.display="block";
init();run=true;
}

function restart(){
document.getElementById("gameover").style.display="none";
document.getElementById("ui").style.display="block";
init();run=true;
}

function shop(){
let s=prompt("1=Normal, 2=Hızlı (50 skor)");
if(s==2 && score>=50){weapon=2;alert("Aldın");}
else alert("Yetersiz skor");
}

function gameOver(){
run=false;
document.getElementById("final").innerText=score;
document.getElementById("gameover").style.display="flex";
}

</script></body>
</html>
