<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Valorant</title>

<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
</style>

</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: canvas.width/2, y: canvas.height/2, size: 20 };
let enemy = { x: 100, y: 100, size: 20 };
let bullets = [];

canvas.addEventListener("touchstart", (e) => {
  let touch = e.touches[0];
  bullets.push({
    x: player.x,
    y: player.y,
    dx: (touch.clientX - player.x)/20,
    dy: (touch.clientY - player.y)/20
  });
});

canvas.addEventListener("touchmove", (e) => {
  let touch = e.touches[0];
  player.x = touch.clientX;
  player.y = touch.clientY;
});

function update() {
  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
  });

  bullets.forEach((b, i) => {
    let dx = b.x - enemy.x;
    let dy = b.y - enemy.y;
    if(Math.sqrt(dx*dx + dy*dy) < enemy.size) {
      enemy.x = Math.random() * canvas.width;
      enemy.y = Math.random() * canvas.height;
      bullets.splice(i,1);
    }
  });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "lime";
  ctx.beginPath();
  ctx.arc(player.x, player.y, 20, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(enemy.x, enemy.y, 20, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "white";
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
    ctx.fill();
  });
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
